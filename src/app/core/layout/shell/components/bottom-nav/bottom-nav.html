<nav class="fixed bottom-0 inset-x-0 z-50 lg:hidden border-t border-gray-100 bg-white">
  <div class="flex items-center justify-around px-1 pt-2 pb-2">

    @for (item of items(); track item.id) {
      <a
        [routerLink]="item.route"
        routerLinkActive="bottom-nav-active"
        class="bottom-tab flex flex-1 flex-col items-center gap-0.5 rounded-xl py-1.5 px-1 text-gray-400"
      >
        <div class="relative">
          <svg xmlns="http://www.w3.org/2000/svg"
               class="bottom-icon h-6 w-6 transition-colors duration-200"
               viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            @for (path of item.iconPaths; track $index) {
              <path [attr.d]="path" />
            }
          </svg>

          <!-- Badge — only rendered when badge value exists -->
          @if (item.badge) {
            <span
              class="absolute -right-1 -top-1 flex h-4 w-4 items-center justify-center rounded-full bg-blue-600 text-[9px] font-bold text-white">
                  {{ item.badge }}
                </span>
          }

          <!-- Active indicator dot -->
          <span class="bottom-dot absolute -bottom-1 left-1/2 -translate-x-1/2 h-1 w-1 rounded-full bg-blue-600"></span>
        </div>

        <span class="bottom-label text-[10px] font-medium transition-colors duration-200">
              {{ item.label }}
            </span>
      </a>
    }

  </div>
</nav>
