<header class="navbar">

  <!-- Logo mark — mobile only -->
  <div class="navbar__logo">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19.5 12.572l-7.5 7.428l-7.5-7.428a5 5 0 1 1 7.5-6.566a5 5 0 1 1 7.5 6.572" />
    </svg>
  </div>

  <!-- Page title -->
  <h2 class="navbar__title">{{ navApi.title() }}</h2>

  <!-- Divider — desktop only -->
  <div class="navbar__divider" aria-hidden="true"></div>

  <!-- Org filter — desktop only -->
  <div class="navbar__org-filter">
    <p-multi-select
      [options]="organizations"
      [(ngModel)]="selectedOrganizations"
      optionLabel="name"
      optionValue="code"
      placeholder="Selecciona una organización"
      [maxSelectedLabels]="3"
      class="w-80"
    />
  </div>

  <!-- Right actions -->
  <div class="navbar__actions">
    <button class="navbar__action-btn" type="button" aria-label="Notificaciones">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 5a2 2 0 1 1 4 0a7 7 0 0 1 4 6v3a4 4 0 0 0 2 3H4a4 4 0 0 0 2-3v-3a7 7 0 0 1 4-6" />
        <path d="M9 17v1a3 3 0 0 0 6 0v-1" />
      </svg>
      <span class="navbar__notification-dot" aria-hidden="true"></span>
    </button>
  </div>

</header>
