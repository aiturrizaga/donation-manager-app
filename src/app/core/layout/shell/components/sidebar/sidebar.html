<aside
  class="sidebar"
  [style.width]="sidebarWidth()"
>

  <!-- Header -->
  <div class="sidebar__header"
       [class.sidebar--collapsed]="collapsed()"
  >

    @if (!collapsed()) {
      <div class="sidebar__brand">
        <div class="sidebar__logo">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19.5 12.572l-7.5 7.428l-7.5-7.428a5 5 0 1 1 7.5-6.566a5 5 0 1 1 7.5 6.572" />
            <path
              d="M12 6l-3.293 3.293a1 1 0 0 0 0 1.414l.543.543c.69.69 1.81.69 2.5 0l1-1a3.182 3.182 0 0 1 4.5 0l2.25 2.25" />
            <path d="M12.5 15.5l2 2" />
            <path d="M15 13l2 2" />
          </svg>
        </div>

        <div class="sidebar__brand-text">
          <span class="sidebar__brand-name">Donation Hub</span>
          <span class="sidebar__brand-version">v1.0.0</span>
        </div>
      </div>
    }

    <button
      type="button"
      class="sidebar__collapse-btn"
      (click)="onCollapseClick()"
      [attr.aria-label]="collapsed() ? 'Expandir sidebar' : 'Colapsar sidebar'"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        class="sidebar__collapse-icon"
        [class.sidebar__collapse-icon--rotated]="collapsed()"
      >
        <path stroke="none" d="M0 0h24v24H0z" fill="none" />
        <path d="M4 6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-12a2 2 0 0 1-2-2l0-12" />
        <path d="M9 4v16" />
        <path d="M15 10l-2 2l2 2" />
      </svg>
    </button>

  </div>

  <!-- Navigation -->
  <nav class="sidebar__nav">
    @for (group of navItems(); track group.label) {
      <p
        class="nav-group__label"
        [class.nav-group__label--hidden]="collapsed()"
        [class.mt-3]="!$first"
      >
        {{ group.label }}
      </p>

      @for (item of group.items; track item.id) {
        <a
          [routerLink]="item.routerLink"
          routerLinkActive="nav-item--active"
          class="nav-item"
          [class.nav-item--collapsed]="collapsed()"
          [tooltipDisabled]="!collapsed()"
          [pTooltip]="collapsed() ? item.label : ''"
          tooltipPosition="right"
        >
          <i class="nav-item__icon" [class]="item.icon"></i>
          <span
            class="nav-item__label"
            [class.nav-item__label--hidden]="collapsed()"
          >
            {{ item.label }}
          </span>
        </a>
      }
    }
  </nav>

  <!-- Footer -->
  <button
    type="button"
    class="sidebar__footer"
    [class.sidebar__footer--collapsed]="collapsed()"
    (click)="onUserMenuToggle($event)"
    aria-label="Menú de usuario"
  >
    <p-avatar label="JS" shape="circle" />

    @if (!collapsed()) {
      <div class="sidebar__user-info">
        <p class="sidebar__user-name">John Smith</p>
        <p class="sidebar__user-role">Superadmin</p>
      </div>
      <i class="ti ti-dots-vertical sidebar__footer-dots"></i>
    }
  </button>

</aside>

<p-menu
  #userMenu
  [model]="userMenuItems"
  [popup]="true"
  styleClass="sidebar-user-menu"
  [style]="{ width: '244px' }"
/>
