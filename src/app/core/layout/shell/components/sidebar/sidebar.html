<aside
  class="hidden lg:flex shrink-0 flex-col border-r border-gray-200 bg-white overflow-hidden relative"
  [style.width]="collapsed() ? '64px' : '256px'"
  [class.collapsed]="collapsed()"
>

  <!-- Logo + collapse toggle -->
  <button
    (click)="toggleCollapse()"
    class="logo-btn logo-wrap group flex h-16 w-full shrink-0 items-center gap-3 border-b border-gray-200 px-4 text-left"
    [attr.aria-label]="collapsed() ? 'Expandir sidebar' : 'Colapsar sidebar'"
  >
    <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-lg bg-violet-600">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19.5 12.572l-7.5 7.428l-7.5-7.428a5 5 0 1 1 7.5-6.566a5 5 0 1 1 7.5 6.572"/>
        <path d="M12 6l-3.293 3.293a1 1 0 0 0 0 1.414l.543.543c.69.69 1.81.69 2.5 0l1-1a3.182 3.182 0 0 1 4.5 0l2.25 2.25"/>
        <path d="M12.5 15.5l2 2"/><path d="M15 13l2 2"/>
      </svg>
    </div>
    <div class="nav-text-wrap flex flex-1 items-center justify-between overflow-hidden">
      <div class="flex flex-col leading-none">
        <span class="text-[13px] font-semibold text-gray-900">Donation Manager</span>
        <span class="mt-0.5 text-[10px] text-gray-400">v1.0 · MVP</span>
      </div>
      <!-- Tabler icon: layout-sidebar-left-collapse -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
           class="collapse-arrow size-6 shrink-0 text-gray-400 cursor-pointer">
        <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
        <path d="M4 6a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2l0 -12"/>
        <path d="M9 4v16"/>
        <path d="M15 10l-2 2l2 2"/>
      </svg>
    </div>
  </button>

  <!-- Nav groups — driven by MenuItem[] input -->
  <nav class="flex-1 overflow-y-auto overflow-x-hidden px-3 py-4">
    @for (group of groups(); track group.label) {
      <p
        class="nav-group-label mb-1 px-3 text-[10px] font-semibold uppercase tracking-widest text-gray-400"
        [class.mt-5]="!$first"
      >
        {{ group.label }}
      </p>

      @for (item of group.items; track item.id) {
        <a
          [routerLink]="item.routerLink"
          routerLinkActive="nav-active"
          [title]="item.label ?? ''"
          class="nav-link mb-0.5 flex items-center gap-3 rounded-lg px-3 py-2.5 text-[13px] text-gray-600 transition-colors duration-150 hover:bg-blue-50 hover:text-blue-700"
        >
          <!--
            Icon rendered as a Tabler Icons CSS class (e.g. "ti ti-layout-dashboard").
            Requires @tabler/icons-webfont installed and imported in styles.
          -->
          <i class="nav-icon shrink-0 text-gray-400" [class]="item.icon"></i>

          <span class="nav-text-wrap flex-1">{{ item.label }}</span>

          @if (item.badge) {
            <span class="nav-badge rounded-full bg-blue-100 px-2 py-0.5 text-[10px] font-semibold text-blue-700 shrink-0">
                  {{ item.badge }}
                </span>
          }
        </a>
      }
    }
  </nav>

  <!-- User footer -->
  <div
    class="flex shrink-0 items-center gap-3 border-t border-gray-200 px-4 py-3 transition-all duration-280"
    [class.justify-center]="collapsed()"
    [class.px-0]="collapsed()"
  >
    <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-blue-600 text-[11px] font-bold text-white">
      EA
    </div>
    @if (!collapsed()) {
      <div class="min-w-0 flex-1 overflow-hidden">
        <p class="truncate text-[12px] font-semibold text-gray-800">Eduardo Arce</p>
        <p class="text-[11px] text-gray-400">Superadmin</p>
      </div>
      <button
        routerLink="/configuracion/perfil"
        class="shrink-0 rounded-lg p-1.5 text-gray-400 transition-colors hover:bg-gray-100 hover:text-gray-700"
        aria-label="Perfil"
      >
        <!-- Tabler icon: dots-vertical -->
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 12m-1 0a1 1 0 1 0 2 0a1 1 0 1 0-2 0"/>
          <path d="M12 19m-1 0a1 1 0 1 0 2 0a1 1 0 1 0-2 0"/>
          <path d="M12 5m-1 0a1 1 0 1 0 2 0a1 1 0 1 0-2 0"/>
        </svg>
      </button>
    }
  </div>

</aside>
