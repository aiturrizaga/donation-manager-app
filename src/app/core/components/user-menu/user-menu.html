<button
  type="button"
  class="user-menu__trigger"
  aria-label="Menú de usuario"
  (click)="onToggle($event)"
>
  @if (loading()) {
    <div class="flex items-center gap-2.5 px-1">
      <p-skeleton shape="circle" size="2rem" />
      <div class="hidden sm:flex flex-col gap-1">
        <p-skeleton height="0.75rem" width="6rem" />
        <p-skeleton height="0.625rem" width="3.5rem" />
      </div>
    </div>
  } @else {
    <app-profile-card
      [name]="user().fullName"
      [role]="user().role"
      [initials]="user().initials"
      [showChevron]="true"
      size="md"
    />
  }
</button>

<p-menu
  #menu
  [model]="menuItems"
  [popup]="true"
  styleClass="user-menu__popup"
>
  <ng-template pTemplate="start">
    <div class="user-menu__header">
      <span class="user-menu__header-name">{{ user().fullName }}</span>
      <span class="user-menu__header-email">{{ user().email }}</span>
    </div>
  </ng-template>
</p-menu>
