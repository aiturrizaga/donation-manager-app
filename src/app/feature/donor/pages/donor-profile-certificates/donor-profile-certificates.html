<p-table
  [value]="items()"
  [loading]="loading()"
  [tableStyle]="{ 'min-width': '480px' }"
>
  <ng-template #header>
    <tr>
      <th>Número</th>
      <th>Donación</th>
      <th>Fecha emisión</th>
      <th>Enviado por email</th>
      <th class="w-20"></th>
    </tr>
  </ng-template>

  <ng-template #body let-donation>
    <tr>
      <td>
        <span class="font-mono text-sm font-medium text-gray-900">
          {{ donation.certificate.certificateNumber }}
        </span>
      </td>
      <td>
        <span class="text-sm text-gray-600">
          {{ donation.currency }} {{ donation.amount | number:'1.2-2' }}
        </span>
      </td>
      <td>
        <span class="text-sm text-gray-600">
          {{ donation.certificate.issuedAt | date:'dd MMM yyyy' }}
        </span>
      </td>
      <td>
        <p-tag
          [value]="donation.certificate.sentByEmail ? 'Enviado' : 'Pendiente'"
          [severity]="donation.certificate.sentByEmail ? 'success' : 'secondary'"
        />
      </td>
      <td>
        <p-button
          icon="ti ti-download"
          [text]="true"
          severity="secondary"
          size="small"
          pTooltip="Descargar certificado"
          tooltipPosition="top"
          (onClick)="downloadCertificate(donation.certificate.fileUrl)"
        />
      </td>
    </tr>
  </ng-template>

  <ng-template #emptymessage>
    <tr>
      <td colspan="5" class="py-0 text-center">
        <app-empty-state
          icon="ti-certificate-off"
          iconClass="text-5xl"
          title="Sin certificados"
          description="Este donante no tiene certificados generados."
        />
      </td>
    </tr>
  </ng-template>
</p-table>
