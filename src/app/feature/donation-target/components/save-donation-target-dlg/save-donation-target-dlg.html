<form [formGroup]="form" (ngSubmit)="save()" class="flex flex-col gap-4 w-full">

  <div class="flex flex-col gap-1">
    <label class="font-medium">Organización</label>
    <p-select
      formControlName="organizationId"
      [options]="organizations()"
      optionLabel="tradeName"
      optionValue="id"
      placeholder="Selecciona una organización"
      class="w-full"
      appendTo="body"
      [invalid]="formValidator.hasError('organizationId')"
    />
    @if (formValidator.hasError('organizationId')) {
      <p-message severity="error" size="small" variant="simple">
        {{ formValidator.getErrorMessage('organizationId') }}
      </p-message>
    }
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
    <div class="flex flex-col gap-1">
      <label class="font-medium">Tipo</label>
      <p-select
        formControlName="targetType"
        [options]="typeOptions"
        optionLabel="label"
        optionValue="value"
        class="w-full"
        appendTo="body"
      />
    </div>

    <div class="flex flex-col gap-1">
      <label class="font-medium">Nombre</label>
      <input
        pInputText
        type="text"
        formControlName="name"
        placeholder="Ej. Becas de excelencia"
        maxlength="150"
        [invalid]="formValidator.hasError('name')"
      />
      @if (formValidator.hasError('name')) {
        <p-message severity="error" size="small" variant="simple">
          {{ formValidator.getErrorMessage('name') }}
        </p-message>
      }
    </div>
  </div>

  <div class="flex flex-col gap-1">
    <label class="font-medium">
      Descripción
      <span class="text-gray-400 font-normal text-xs ml-1">(opcional)</span>
    </label>
    <textarea
      pTextarea
      formControlName="description"
      placeholder="Describe el objetivo de esta campaña o causa..."
      rows="3"
      class="w-full"
    ></textarea>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
    <div class="flex flex-col gap-1">
      <label class="font-medium">
        Meta (S/)
        <span class="text-gray-400 font-normal text-xs ml-1">(opcional)</span>
      </label>
      <p-input-number
        formControlName="amountGoal"
        mode="decimal"
        [minFractionDigits]="2"
        [maxFractionDigits]="2"
        placeholder="0.00"
        class="w-full"
      />
    </div>

    <div class="flex flex-col gap-1">
      <label class="font-medium">
        Inicio
        <span class="text-gray-400 font-normal text-xs ml-1">(opcional)</span>
      </label>
      <p-date-picker
        formControlName="startsAt"
        dateFormat="dd/mm/yy"
        [showClear]="true"
        class="w-full"
        appendTo="body"
      />
    </div>

    <div class="flex flex-col gap-1">
      <label class="font-medium">
        Fin
        <span class="text-gray-400 font-normal text-xs ml-1">(opcional)</span>
      </label>
      <p-date-picker
        formControlName="endsAt"
        dateFormat="dd/mm/yy"
        [showClear]="true"
        class="w-full"
        appendTo="body"
      />
    </div>
  </div>

  <div class="flex items-center gap-3">
    <p-toggleswitch formControlName="isPublic" />
    <div class="flex flex-col gap-0.5">
      <span class="text-sm font-medium">Visible públicamente</span>
      <span class="text-xs text-gray-400">Si está desactivado, solo aparece en el panel de administración</span>
    </div>
  </div>

  <div class="flex justify-end gap-2 mt-2">
    <p-button
      label="Cancelar"
      severity="secondary"
      [outlined]="true"
      type="button"
      (click)="close()"
    />
    <p-button
      type="submit"
      [label]="target() ? 'Actualizar' : 'Crear objetivo'"
      [loading]="isSaving()"
    />
  </div>

</form>
