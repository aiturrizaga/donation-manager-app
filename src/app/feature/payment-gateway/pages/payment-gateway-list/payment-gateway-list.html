<div class="card">

  <!-- Toolbar -->
  <div class="toolbar">
    <app-payment-gateway-filters
      class="flex-1"
      [organizations]="organizations()"
      (filtersChange)="onFiltersChange($event)"
    />
    <div class="toolbar__actions">
      @if (store.organizationId()) {
        <button pButton (click)="openDialog()">
          <i class="ti ti-plus" pButtonIcon></i>
          <span pButtonLabel class="hidden sm:inline">Nueva pasarela</span>
          <span pButtonLabel class="inline sm:hidden">Nueva</span>
        </button>
      }
    </div>
  </div>

  <!-- Empty state sin org seleccionada -->
  @if (!store.organizationId()) {
    <div class="py-12 text-center">
      <i class="ti ti-building-community text-5xl text-gray-300"></i>
      <p class="text-sm text-gray-400 mt-3">
        Selecciona una organización para ver sus pasarelas
      </p>
    </div>
  } @else {
    <app-payment-gateway-data-view
      [items]="store.items()"
      [isLoading]="store.loading()"
      (edit)="onEdit($event)"
      (test)="onTest($event)"
      (toggle)="onToggle($event)"
    />
  }

</div>
