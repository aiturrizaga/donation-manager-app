<p-table
  [value]="isLoading() ? skeletonRows : items()"
  [loading]="false"
  [lazy]="true"
  [paginator]="true"
  [rows]="rows()"
  [first]="first()"
  [totalRecords]="total()"
  (onPage)="pageChange.emit($event)"
  [rowsPerPageOptions]="[10, 25, 50]"
  [showCurrentPageReport]="true"
  paginatorDropdownAppendTo="body"
  currentPageReportTemplate="{first} – {last} de {totalRecords}"
  class="app-table"
  paginatorStyleClass="flex! justify-end!"
  [tableStyle]="{ 'min-width': '640px' }"
>

  <ng-template #header>
    <tr>
      <th>Organización</th>
      <th>RUC</th>
      <th>Contacto</th>
      <th>Estado</th>
      <th class="w-24"></th>
    </tr>
  </ng-template>

  <ng-template #body let-org>
    @if (isLoading()) {
      <tr>
        <td>
          <p-skeleton height="1rem" width="70%" />
        </td>
        <td>
          <p-skeleton height="1rem" width="6rem" />
        </td>
        <td>
          <p-skeleton height="1rem" width="60%" />
        </td>
        <td>
          <p-skeleton height="1.5rem" width="4rem" borderRadius="999px" />
        </td>
        <td></td>
      </tr>
    } @else {
      <tr>

        <td>
          <div class="flex flex-col gap-0.5">
            <span class="font-medium text-gray-900">{{ org.legalName }}</span>
            @if (org.tradeName) {
              <span class="text-xs text-gray-400">{{ org.tradeName }}</span>
            }
          </div>
        </td>

        <td>
          <span class="font-mono text-gray-700">{{ org.ruc }}</span>
        </td>

        <td>
          <div class="flex flex-col gap-0.5">
            @if (org.email) {
              <span class="flex items-center gap-1.5 text-xs text-gray-500">
                <i class="ti ti-mail text-gray-400"></i>{{ org.email }}
              </span>
            }
            @if (org.phone) {
              <span class="flex items-center gap-1.5 text-xs text-gray-500">
                <i class="ti ti-phone text-gray-400"></i>{{ org.phone }}
              </span>
            }
            @if (!org.email && !org.phone) {
              <span class="text-gray-400">—</span>
            }
          </div>
        </td>

        <td>
          <p-tag
            [value]="org.isActive ? 'Activo' : 'Inactivo'"
            [severity]="org.isActive ? 'success' : 'secondary'"
          />
        </td>

        <td>
          <div class="flex items-center gap-1">
            <p-button
              [icon]="org.isActive ? 'ti ti-toggle-right' : 'ti ti-toggle-left'"
              [pTooltip]="org.isActive ? 'Desactivar' : 'Activar'"
              tooltipPosition="top"
              severity="secondary"
              [text]="true"
              size="small"
              (onClick)="toggleActive.emit(org)"
            />
            <p-button
              icon="ti ti-trash"
              pTooltip="Eliminar"
              tooltipPosition="top"
              severity="danger"
              [text]="true"
              size="small"
              (onClick)="delete.emit(org)"
            />
          </div>
        </td>

      </tr>
    }
  </ng-template>

  <ng-template #emptymessage>
    @if (!isLoading()) {
      <tr>
        <td colspan="5" class="text-center py-0">
          <app-empty-state
            icon="ti-building-bank"
            iconClass="text-5xl"
            title="No se encontraron organizaciones"
            description="Intenta ajustar los filtros o crea una nueva organización"
          />
        </td>
      </tr>
    }
  </ng-template>

</p-table>
